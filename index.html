<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP8266 Buzzer Remote</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding-top: 100px;
        }
        .buzz-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .buzz-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>NodeMCU Hardware Interface</h1>
    <!-- Clickable action item elements trigger the target sound function -->
    <button class="buzz-btn" onclick="triggerBuzzer()">🔊 SOUND BUZZER</button>

    <script>
        function triggerBuzzer() {
            // REPLACE THIS IP with your exact serial monitor IP address
            const espIP = "http://192.168.1.8"; 
            
            // Delivers a stealthy background signal without redirecting the page
            fetch(espIP, { mode: 'cors' })
            .then(response => console.log("Success! Code sent."))
            .catch(error => console.error("Error contacting board:", error));
        }
    </script>

</body>
</html>
